[changelog]
header = """
# Changelog
"""
body = """
{% if version -%}
## [{{ version | trim_start_matches(pat="v") }}] - {{ timestamp | date(format="%Y-%m-%d") }}
{% else -%}
## [Unreleased]
{% endif -%}
{% for group, commits in commits | group_by(attribute="group") %}
### {{ group }}
{% for commit in commits %}
- {% if commit.breaking %}[BREAKING] {% endif %}{% if commit.scope %}**{{ commit.scope }}:** {% endif %}{{ commit.message | upper_first }}\
{% endfor %}
{% endfor -%}
"""
trim = true
render_always = true

[git]
conventional_commits = true
filter_unconventional = false
split_commits = false
commit_preprocessors = [
  { pattern = '\((\w+\s)?#([0-9]+)\)', replace = "([#${2}](https://github.com/olegshulyakov/agent.md/issues/${2}))" },
]
commit_parsers = [
  { message = "^Merge ", skip = true },
  { body = "(?i).*(security|cve)", group = "Security" },
  { message = "(?i)^fix.*(security|cve)", group = "Security" },
  { message = "^feat", group = "Added" },
  { message = "^fix", group = "Fixed" },
  { message = "^deprecated?", group = "Deprecated" },
  { message = "^removed?", group = "Removed" },
  { message = "^docs", group = "Changed" },
  { message = "^perf", group = "Changed" },
  { message = "^refactor", skip = true },
  { message = "^test", skip = true },
  { message = "^build", skip = true },
  { message = "^ci", skip = true },
  { message = "^style", skip = true },
  { message = "^chore", skip = true },
  { message = ".*", group = "Changed" },
]
filter_commits = true
tag_pattern = "v[0-9]*"
topo_order = false
sort_commits = "oldest"
